  /v1/object-detection-records/timebuckets:
    post:
      summary: Query object detection time buckets (returns object lists per bucket)
      tags:
      - ObjectDetection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - filters
              - granularity
              properties:
                filters:
                  type: object
                  required:
                  - time
                  properties:
                    time:
                      type: object
                      required:
                      - startAt
                      - endAt
                      properties:
                        startAt:
                          type: string
                          format: date-time
                          example: '2024-01-01T00:00:00Z'
                        endAt:
                          type: string
                          format: date-time
                          example: '2024-01-02T00:00:00Z'
                    cameras:
                      type: array
                      items:
                        type: string
                      example:
                      - 0002D1A3D613
                    objType:
                      type: string
                      enum:
                      - HUMAN
                      - VEHICLE
                      example: HUMAN
                    rulesByCamera:
                      type: object
                      description: Map of MAC address to rule config (same format
                        as TimebucketCountsRequest)
                      additionalProperties:
                        type: object
                        description: Flat rule for timebucket API; discriminated by
                          'type' field
                        required:
                        - type
                        properties:
                          type:
                            type: string
                            enum:
                            - LINE_CROSSING
                            - LOITERING
                            - DWELL
                            - INTRUSION
                          line:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: number
                                y:
                                  type: number
                          direction:
                            type: string
                            enum:
                            - IN
                            - OUT
                            - ANY
                          field:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: number
                                y:
                                  type: number
                          stayTime:
                            type: number
                            description: Minimum stay time in seconds
                granularity:
                  type: string
                  description: ISO 8601 duration
                  example: PT1H
                cursor:
                  type: string
                  description: Pagination cursor from previous response
                alignTo:
                  type: string
                  enum:
                  - hour
                  - day
                  description: Optional bucket alignment
                timezone:
                  type: string
                  default: UTC
                  description: IANA timezone ID (e.g. Asia/Taipei, America/New_York)
                  example: UTC
      responses:
        '200':
          description: Time bucket results with object lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        startAt:
                          type: string
                          format: date-time
                        endAt:
                          type: string
                          format: date-time
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              oid:
                                type: string
                                example: '1777507181551'
                              camera:
                                type: string
                                example: 0002D1A3D613
                              dwellTime:
                                type: number
                                nullable: true
                  nextCursor:
                    type: string
                    nullable: true
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
  /v1/object-detection-records/timebuckets/counts:
    post:
      summary: Query object detection time bucket counts (with line-crossing support)
      tags:
      - ObjectDetection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - filters
              - granularity
              properties:
                filters:
                  type: object
                  required:
                  - time
                  properties:
                    time:
                      type: object
                      required:
                      - startAt
                      - endAt
                      properties:
                        startAt:
                          type: string
                          format: date-time
                          example: '2024-01-01T00:00:00Z'
                        endAt:
                          type: string
                          format: date-time
                          example: '2024-01-02T00:00:00Z'
                    cameras:
                      type: array
                      items:
                        type: string
                      example:
                      - 0002D1A3D613
                    objType:
                      type: string
                      enum:
                      - HUMAN
                      - VEHICLE
                    rulesByCamera:
                      type: object
                      description: Map of MAC address to rule config
                      additionalProperties:
                        type: object
                        required:
                        - type
                        properties:
                          type:
                            type: string
                            enum:
                            - LINE_CROSSING
                            - LOITERING
                            - DWELL
                            - INTRUSION
                          line:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: number
                                y:
                                  type: number
                          direction:
                            type: string
                            enum:
                            - IN
                            - OUT
                            - ANY
                          field:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: number
                                y:
                                  type: number
                          stayTime:
                            type: number
                            description: Minimum stay time in seconds
                granularity:
                  type: string
                  example: PT1H
                cursor:
                  type: string
                  nullable: true
                alignTo:
                  type: string
                  enum:
                  - hour
                  - day
                timezone:
                  type: string
                  default: UTC
                  description: IANA timezone ID
                  example: UTC
      responses:
        '200':
          description: Time bucket count results
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        startAt:
                          type: string
                          format: date-time
                          example: '2026-04-29T00:00:00Z'
                        endAt:
                          type: string
                          format: date-time
                          example: '2026-04-29T01:00:00Z'
                        totalCount:
                          type: integer
                          example: 132
                        inCount:
                          type: integer
                          nullable: true
                          example: 43
                        outCount:
                          type: integer
                          nullable: true
                          example: 89
                        dwellAvg:
                          type: number
                          nullable: true
                          description: Average dwell time in seconds (when loitering
                            rule is used)
                        countsByCamera:
                          type: array
                          items:
                            type: object
                            properties:
                              camera:
                                type: string
                                example: 0002D1A3D613
                              count:
                                type: integer
                                example: 132
                              inboundCount:
                                type: integer
                                example: 43
                              outboundCount:
                                type: integer
                                example: 89
                  nextCursor:
                    type: string
                    nullable: true
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
