  /api/deepsearch/getaggregates:
    post:
      summary: Get aggregated detection data (VSLC)
      tags:
      - VSLC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: VSLC query request
              properties:
                columns:
                  type: array
                  description: Columns to select/aggregate
                  items:
                    type: object
                    required:
                    - field
                    - type
                    - aggregationFunction
                    properties:
                      field:
                        type: string
                        description: Column field name (e.g. MacAddress, Device, Type,
                          Site, StartTime, EndTime, Oid, Age, Gender, etc.)
                      type:
                        type: string
                        description: Data type hint (string, dt, int, double, date,
                          datetime, object)
                      aggregationFunction:
                        type: string
                        nullable: true
                        enum:
                        - COUNT
                        - null
                filters:
                  type: object
                  description: Nested filter tree
                  properties:
                    type:
                      type: string
                      enum:
                      - and
                      - or
                      - string
                      - dt
                      - int
                      - double
                      - object
                    field:
                      type: string
                    value:
                      description: Filter value (type depends on field)
                    condition:
                      type: string
                      description: e.g. equal, gt, lte
                    filterClause:
                      type: array
                      items:
                        type: object
                        description: Recursive filter nodes
                sorting:
                  type: array
                  items:
                    type: object
                    properties:
                      columnName:
                        type: string
                      ascending:
                        type: boolean
                      sortOrder:
                        type: integer
                paging:
                  type: object
                  properties:
                    page:
                      type: integer
                    nrOfRecords:
                      type: integer
      responses:
        '200':
          description: Aggregated data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    page:
                      type: integer
                    nrOfRecords:
                      type: integer
                    data:
                      type: array
                      items:
                        type: object
                        description: Dynamic keys based on requested columns
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
