openapi: 3.0.3
info:
  title: VortexAI API
  version: 1.0.0
  description: VortexAI backend REST API
servers:
- url: https://{host}
  variables:
    host:
      default: vortexai.dev.vortexcloud.com
      enum:
      - vortexai.dev.vortexcloud.com
      - vortexai.stage.vortexcloud.com
      - vortexai.vortexcloud.com
      - localhost
security:
- bearerAuth: []
paths:
  /login:
    post:
      summary: Get JWT token
      tags:
      - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: secret
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                    example: eyJr...
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
  /userFeedback:
    post:
      summary: Submit user feedback for a detection event
      tags:
      - UserFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - thingName
              - eventID
              properties:
                thingName:
                  type: string
                  description: Device thing name with timestamp suffix
                  example: 0002D198B5E2-1662453481003
                eventID:
                  type: string
                  description: Event ID in format {timestamp}#{rule_id}
                  example: 1686314292908#194c4d6a-3ad3-4906-aefd-ec94a8579372
                derivant:
                  type: string
                  description: Derivant identifier (optional, defaults to 'none')
                  default: none
                  example: none
      responses:
        '200':
          description: Feedback submitted
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Forbidden
    user_feedback_status:
      get:
        summary: Check if a detection event has been feedbacked
        tags:
        - UserFeedback
        parameters:
        - name: thingName
          in: query
          required: true
          schema:
            type: string
            example: 0002D198B5E2-1662453481003
        - name: eventID
          in: query
          required: true
          schema:
            type: string
            example: 1686314292908#194c4d6a-3ad3-4906-aefd-ec94a8579372
        - name: derivant
          in: query
          schema:
            type: string
            default: none
            example: none
        responses:
          '200':
            description: Feedback status
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: 1686314292908#xxx has been reported
                    isFeedbacked:
                      type: boolean
                      example: true
          '400':
            description: Bad request - invalid parameters or body
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: thingName (0002D1345678) is invalid
          '403':
            description: Insufficient permissions
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Forbidden
    query_userfeedback:
      get:
        summary: Query user feedback records (requires X-VIVOTEK-AUTH header)
        tags:
        - UserFeedback
        parameters:
        - name: organization
          in: query
          schema:
            type: string
        - name: starttime
          in: query
          schema:
            type: string
        - name: endtime
          in: query
          schema:
            type: string
        - name: thingname
          in: query
          schema:
            type: string
        - name: X-VIVOTEK-AUTH
          in: header
          required: true
          schema:
            type: string
        responses:
          '200':
            description: Feedback records
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    totalRecord:
                      type: integer
                    records:
                      type: array
                      items:
                        type: object
                        properties:
                          thingName:
                            type: string
                          event_id:
                            type: string
                          user_id:
                            type: string
                          create_time:
                            type: string
                            format: date-time
                          event_time:
                            type: integer
                          rule_type:
                            type: string
                          rule_id:
                            type: string
                          event_localtime:
                            type: integer
                          suspect_oid:
                            type: string
                          archive_starttime:
                            type: string
                            format: date-time
                          archive_endtime:
                            type: string
                            format: date-time
                          archive_status:
                            type: integer
                          model_name:
                            type: string
                          firmware_version:
                            type: string
                          vca_version:
                            type: string
          '400':
            description: Bad request - invalid parameters or body
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: thingName (0002D1345678) is invalid
          '403':
            description: Insufficient permissions
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Forbidden
  /userFeedbackStatus:
    get:
      summary: Check if a detection event has been feedbacked
      tags:
      - UserFeedback
      parameters:
      - name: thingName
        in: query
        required: true
        schema:
          type: string
          example: 0002D198B5E2-1662453481003
      - name: eventID
        in: query
        required: true
        schema:
          type: string
          example: 1686314292908#194c4d6a-3ad3-4906-aefd-ec94a8579372
      - name: derivant
        in: query
        schema:
          type: string
          default: none
          example: none
      responses:
        '200':
          description: Feedback status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 1686314292908#xxx has been reported
                  isFeedbacked:
                    type: boolean
                    example: true
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Forbidden
  /query_userfeedback:
    get:
      summary: Query user feedback records (requires X-VIVOTEK-AUTH header)
      tags:
      - UserFeedback
      parameters:
      - name: organization
        in: query
        schema:
          type: string
      - name: starttime
        in: query
        schema:
          type: string
      - name: endtime
        in: query
        schema:
          type: string
      - name: thingname
        in: query
        schema:
          type: string
      - name: X-VIVOTEK-AUTH
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Feedback records
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRecord:
                    type: integer
                  records:
                    type: array
                    items:
                      type: object
                      properties:
                        thingName:
                          type: string
                        event_id:
                          type: string
                        user_id:
                          type: string
                        create_time:
                          type: string
                          format: date-time
                        event_time:
                          type: integer
                        rule_type:
                          type: string
                        rule_id:
                          type: string
                        event_localtime:
                          type: integer
                        suspect_oid:
                          type: string
                        archive_starttime:
                          type: string
                          format: date-time
                        archive_endtime:
                          type: string
                          format: date-time
                        archive_status:
                          type: integer
                        model_name:
                          type: string
                        firmware_version:
                          type: string
                        vca_version:
                          type: string
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Forbidden
  /v2/deepsearch:
    post:
      summary: Search object detection records (v2)
      description: 'Cursor-based paginated search. The `cursor` field is bound to
        the original

        query parameters — changing any field (e.g. `objType`) while reusing a cursor

        returns 400.

        '
      tags:
      - Deepsearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - time
              - cameras
              properties:
                time:
                  type: object
                  required:
                  - startAt
                  - endAt
                  properties:
                    startAt:
                      type: string
                      format: date-time
                      example: '2024-01-01T00:00:00Z'
                    endAt:
                      type: string
                      format: date-time
                      example: '2024-01-02T00:00:00Z'
                    dailySchedule:
                      type: object
                      description: Filter by time-of-day window; supports cross-midnight
                        ranges
                      properties:
                        start:
                          type: string
                          example: 08:00:00
                        end:
                          type: string
                          example: '19:59:59'
                cameras:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example:
                  - 0002D1A3D613
                objType:
                  type: string
                  enum:
                  - HUMAN
                  - VEHICLE
                  example: HUMAN
                sort:
                  type: string
                  enum:
                  - +time
                  - -time
                  description: +time = ascending, -time = descending
                  example: -time
                limit:
                  type: integer
                  example: 20
                cursor:
                  type: string
                  description: Pagination cursor from previous response; must match
                    original query parameters
                attributes:
                  type: object
                  description: Attribute filters; keys depend on objType
                  properties:
                    age:
                      type: array
                      items:
                        type: string
                        enum:
                        - CHILD
                        - ADULT
                      example:
                      - ADULT
                    gender:
                      type: array
                      items:
                        type: string
                        enum:
                        - MALE
                        - FEMALE
                      example:
                      - MALE
                    upperColor:
                      type: array
                      items:
                        type: string
                        enum:
                        - RED
                        - BROWN
                        - ORANGE
                        - YELLOW
                        - GREEN
                        - BLUE
                        - PURPLE
                        - PINK
                        - GRAY
                        - WHITE
                        - BLACK
                      example:
                      - RED
                      - BLUE
                    lowerColor:
                      type: array
                      items:
                        type: string
                        enum:
                        - RED
                        - BROWN
                        - ORANGE
                        - YELLOW
                        - GREEN
                        - BLUE
                        - PURPLE
                        - PINK
                        - GRAY
                        - WHITE
                        - BLACK
                      example:
                      - BLACK
                    accessories:
                      type: array
                      items:
                        type: string
                        enum:
                        - BAG
                        - HAT
                      example:
                      - BAG
                    type:
                      type: array
                      description: Vehicle type filter
                      items:
                        type: string
                        enum:
                        - CAR
                        - TRUCK
                        - BUS
                        - MOTORCYCLE
                        - BICYCLE
                        - FORKLIFT
                      example:
                      - CAR
                    color:
                      type: array
                      description: Vehicle color filter
                      items:
                        type: string
                        enum:
                        - RED
                        - ORANGE
                        - YELLOW
                        - GREEN
                        - BLUE
                        - GRAY
                        - BROWN
                        - WHITE
                        - BLACK
                      example:
                      - BLUE
                      - WHITE
                rule:
                  type: object
                  description: Map of MAC address to per-camera rule config
                  additionalProperties:
                    type: object
                    properties:
                      lineCrossingDetection:
                        type: object
                        properties:
                          line:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: integer
                                y:
                                  type: integer
                          direction:
                            type: string
                            enum:
                            - IN
                            - OUT
                            - ANY
                            example: ANY
                      loiteringDetection:
                        type: object
                        properties:
                          field:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: integer
                                y:
                                  type: integer
                          stayTime:
                            type: integer
                            description: Minimum loiter duration in seconds
                            example: 2
                      intrusionDetection:
                        type: object
                        properties:
                          field:
                            type: array
                            items:
                              type: object
                              properties:
                                x:
                                  type: integer
                                y:
                                  type: integer
                options:
                  type: object
                  properties:
                    includeLoiterTime:
                      type: boolean
                      description: Requires at least one loiteringDetection rule
                      example: true
                    includePresignUrl:
                      type: boolean
                      description: Include presigned S3 URLs in thumbnailJson
                      example: true
                debug:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Search results with cursor
          content:
            application/json:
              schema:
                type: object
                properties:
                  objectDetectionRecords:
                    type: array
                    items:
                      type: object
                      properties:
                        oid:
                          type: string
                          example: '1777507181551'
                        camera:
                          type: string
                          example: 0002D1A3D613
                        objType:
                          type: string
                          description: 'Human or Vehicle (note: mixed case from server)'
                          example: Human
                        firstTime:
                          type: string
                          format: date-time
                          example: '2026-04-29T23:59:41Z'
                        extraInfo:
                          type: object
                          nullable: true
                          properties:
                            background:
                              type: object
                              properties:
                                time:
                                  type: string
                                  format: date-time
                                  example: '2026-04-29T23:59:40Z'
                        trajectoryPoints:
                          type: array
                          nullable: true
                          items:
                            type: object
                            properties:
                              time:
                                type: integer
                                description: Unix timestamp in milliseconds
                                example: 1777507181516
                              x:
                                type: integer
                                example: 6002
                              y:
                                type: integer
                                example: 3871
                        thumbnailJson:
                          type: object
                          nullable: true
                          properties:
                            thumbnail:
                              type: array
                              items:
                                type: object
                                properties:
                                  s3Bucket:
                                    type: string
                                    example: hulk-devices-push-storage-the-greate-one-vsaas-vortex-dev
                                  s3Key:
                                    type: string
                                  startPosition:
                                    type: integer
                                  length:
                                    type: integer
                                  presignedUrl:
                                    type: string
                                    nullable: true
                            faceThumbnail:
                              type: array
                              items:
                                type: object
                                properties:
                                  s3Bucket:
                                    type: string
                                  s3Key:
                                    type: string
                                  startPosition:
                                    type: integer
                                  length:
                                    type: integer
                                    nullable: true
                                  score:
                                    type: number
                                    nullable: true
                                  presignedUrl:
                                    type: string
                                    nullable: true
                            licensePlateThumbnail:
                              type: array
                              items:
                                type: object
                                properties:
                                  s3Bucket:
                                    type: string
                                  s3Key:
                                    type: string
                                  startPosition:
                                    type: integer
                                  length:
                                    type: integer
                                    nullable: true
                                  plateNumber:
                                    type: string
                                    nullable: true
                                  score:
                                    type: number
                                    nullable: true
                                  presignedUrl:
                                    type: string
                                    nullable: true
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for next page; null if no more results
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Forbidden
  /v2/deepsearch/history:
    get:
      summary: Get deepsearch query history for current user (dev/local only)
      tags:
      - Deepsearch
      responses:
        '200':
          description: History records
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        prompt:
                          type: string
                        meta:
                          type: object
                          description: ThinkSearch request body minus prompt
                          properties:
                            sort:
                              type: object
                              properties:
                                sortedBy:
                                  type: string
                                order:
                                  type: string
                            currentTime:
                              type: string
                              format: date-time
                            timezone:
                              type: string
                            threshold:
                              type: number
                            zillizLevel:
                              type: integer
                            limit:
                              type: integer
                            userOption:
                              type: object
                              nullable: true
                              properties:
                                cameraList:
                                  type: array
                                  items:
                                    type: string
                                subject:
                                  type: array
                                  items:
                                    type: string
                                time:
                                  type: object
                                  nullable: true
                                  properties:
                                    dateStart:
                                      type: string
                                    dateEnd:
                                      type: string
                                    timeStart:
                                      type: string
                                    timeEnd:
                                      type: string
                                    periodic:
                                      type: boolean
                            language:
                              type: string
                              enum:
                              - en-US
                              - zh-TW
                              - ja-JP
                        time:
                          type: string
                          format: date-time
    delete:
      summary: Clear deepsearch query history for current user
      tags:
      - Deepsearch
      responses:
        '204':
          description: Cleared
  /v2/deepsearch/descriptions:
    get:
      summary: Get camera descriptions for ThinkSearch
      tags:
      - Deepsearch
      parameters:
      - name: expand
        in: query
        schema:
          type: string
          example: name
        description: Comma-separated fields to expand (e.g. 'name' to include camera
          name)
      responses:
        '200':
          description: Camera descriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  descriptions:
                    type: array
                    items:
                      type: object
                      properties:
                        mac:
                          type: string
                          example: 0002D1A3D613
                        description:
                          type: string
                          example: Lobby entrance camera
                        name:
                          type: string
                          nullable: true
                          example: Lobby Cam 1
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Forbidden
    put:
      summary: Save camera descriptions for ThinkSearch
      tags:
      - Deepsearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cameraDescription:
                  type: array
                  items:
                    type: object
                    required:
                    - mac
                    - description
                    properties:
                      mac:
                        type: string
                        example: 0002D1A3D613
                      description:
                        type: string
                        example: Lobby entrance camera
      responses:
        '204':
          description: Saved
        '400':
          description: Bad request - invalid parameters or body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: thingName (0002D1345678) is invalid
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Forbidden
  /v1/deepsearch:
    post:
      summary: Search object detection records (v1)
      tags:
      - Deepsearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - start
              - end
              - mac_list
              properties:
                start:
                  type: string
                  format: date-time
                  example: '2024-01-01T00:00:00Z'
                end:
                  type: string
                  format: date-time
                  example: '2024-01-02T00:00:00Z'
                mac_list:
                  type: array
                  items:
                    type: string
                  example:
                  - 0002D1A3D613
                obj_type:
                  type: string
                  enum:
                  - Human
                  - Vehicle
                  example: Human
                is_asc:
                  type: boolean
                  example: true
                group_list:
                  type: array
                  items:
                    type: string
                  example: []
                limit:
                  type: integer
                  default: 1000
                  example: 20
                time_limit:
                  type: integer
                  description: Max query time in seconds (1-50)
                  default: 50
                  example: 50
                time_filter:
                  type: object
                  properties:
                    daily_start:
                      type: string
                      example: 08-00-00
                    daily_end:
                      type: string
                      example: 18-00-00
                next_token:
                  type: object
                  nullable: true
                  description: Pagination token from previous response
                  properties:
                    partition_start:
                      type: string
                attributes:
                  type: object
                  description: Attribute filters (age, upper_color, lower_color, etc.)
                  properties:
                    Age:
                      type: string
                      enum:
                      - Adult
                      - Child
                    UpperColor:
                      type: array
                      items:
                        type: string
                        enum:
                        - Red
                        - Brown
                        - Orange
                        - Yellow
                        - Green
                        - Blue
                        - Purple
                        - Pink
                        - Gray
                        - White
                        - Black
                    LowerColor:
                      type: array
                      items:
                        type: string
                        enum:
                        - Red
                        - Brown
                        - Orange
                        - Yellow
                        - Green
                        - Blue
                        - Purple
                        - Pink
                        - Gray
                        - White
                        - Black
                    Accessories:
                      type: array
                      items:
                        type: string
                        enum:
                        - Hat
                        - Bag
                    Color:
                      type: array
                      items:
                        type: string
                      description: Vehicle color filter
                    Gender:
                      type: string
                      enum:
                      - Male
                      - Female
                    Type:
                      type: string
                      enum:
                      - Car
                      - Truck
                      - Bus
                      - Motorcycle
                      - Bicycle
                      - Forklift
                      description: Vehicle type filter
                    include_data:
                      type: array
                      items:
                        type: string
                        enum:
                        - license_plate
                        - clean_license_plate
                        - face
                    relate_count:
                      type: integer
                plate_number:
                  type: string
                  description: License plate number filter for vehicle search
                show_debug_info:
                  type: boolean
                  default: false
                extra_fields:
                  type: array
                  items:
                    type: string
                    enum:
                    - cross_info
                    - milvus
                re:
                  type: object
                  description: Rule engine config; only one rule allowed per request
                  properties:
                    LineCrossingDetection:
                      type: object
                      properties:
                        Direction:
                          type: string
                          enum:
                          - In
                          - Out
                          - Any
                        Line:
                          type: array
                          minItems: 3
                          maxItems: 3
                          items:
                            type: object
                            properties:
                              x:
                                type: integer
                                minimum: 0
                                maximum: 9999
                              y:
                                type: integer
                                minimum: 0
                                maximum: 9999
                    LoiteringDetection:
                      type: object
                      required:
                      - StayTime
                      properties:
                        StayTime:
                          type: integer
                          minimum: 0
                          description: Triggered after StayTime in seconds
                        Field:
                          type: array
                          minItems: 4
                          items:
                            type: object
                            properties:
                              x:
                                type: integer
                                minimum: 0
                                maximum: 9999
                              y:
