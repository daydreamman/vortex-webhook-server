  /thinksearch:
    post:
      summary: Natural language search using LLM agent (ThinkSearch)
      tags:
      - Deepsearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - prompt
              - sort
              - currentTime
              - timezone
              properties:
                prompt:
                  type: string
                  description: Natural language search prompt
                  example: A person wearing red jacket yesterday morning
                sort:
                  type: object
                  properties:
                    sortedBy:
                      type: string
                      enum:
                      - first_time
                      - score
                      example: first_time
                    order:
                      type: string
                      enum:
                      - ASC
                      - DESC
                      example: ASC
                currentTime:
                  type: string
                  format: date-time
                  description: Current UTC time for relative time resolution
                  example: '2026-04-30T08:00:00Z'
                timezone:
                  type: string
                  description: Timezone offset in minutes (-1439 to +1439)
                  example: '+480'
                threshold:
                  type: number
                  default: 0.2
                  example: 0.2
                zillizLevel:
                  type: integer
                  default: 3
                  example: 3
                limit:
                  type: integer
                  default: 1000
                  example: 1000
                userOption:
                  type: object
