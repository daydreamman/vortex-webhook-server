    CaseVaultBrief:
      type: object
      properties:
        caseId:
          type: string
          example: '64675635'
        title:
          type: string
          example: Incident 2024-01-15
        createTime:
          type: string
          format: date-time
          example: '2026-04-27T06:46:53Z'
        lastUpdate:
          type: string
          format: date-time
          example: '2026-04-27T06:46:53Z'
        caseIdAlias:
          type: string
          example: '20260427_1'
        isPin:
          type: boolean
          example: false
        reporter:
          type: string
          description: Email of the user who created the case
          example: user@example.com
    DeepsearchV1Request:
      type: object
      required:
      - start
      - end
      - mac_list
      properties:
        start:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
        end:
          type: string
          format: date-time
          example: '2024-01-02T00:00:00Z'
        mac_list:
          type: array
          items:
            type: string
          example:
          - 0002D1A3D613
        obj_type:
          type: string
          enum:
          - Human
          - Vehicle
          example: Human
        is_asc:
          type: boolean
          example: true
        group_list:
          type: array
          items:
            type: string
          example: []
        limit:
          type: integer
          default: 1000
          example: 20
        time_limit:
          type: integer
          description: Max query time in seconds (1-50)
          default: 50
          example: 50
        time_filter:
          type: object
          properties:
            daily_start:
              type: string
              example: 08-00-00
            daily_end:
              type: string
              example: 18-00-00
        next_token:
          type: object
          nullable: true
          description: Pagination token from previous response
          properties:
            partition_start:
              type: string
        attributes:
          type: object
          description: Attribute filters (age, upper_color, lower_color, etc.)
          properties:
            Age:
              type: string
              enum:
              - Adult
              - Child
            UpperColor:
              type: array
              items:
                type: string
                enum:
                - Red
                - Brown
                - Orange
                - Yellow
                - Green
                - Blue
                - Purple
                - Pink
                - Gray
                - White
                - Black
            LowerColor:
              type: array
              items:
                type: string
                enum:
                - Red
                - Brown
                - Orange
                - Yellow
                - Green
                - Blue
                - Purple
                - Pink
                - Gray
                - White
                - Black
            Accessories:
              type: array
              items:
                type: string
                enum:
                - Hat
                - Bag
            Color:
              type: array
              items:
                type: string
              description: Vehicle color filter
            Gender:
              type: string
              enum:
              - Male
              - Female
            Type:
              type: string
              enum:
              - Car
              - Truck
              - Bus
              - Motorcycle
              - Bicycle
              - Forklift
              description: Vehicle type filter
            include_data:
              type: array
              items:
                type: string
                enum:
                - license_plate
                - clean_license_plate
                - face
            relate_count:
              type: integer
        plate_number:
          type: string
          description: License plate number filter for vehicle search
        show_debug_info:
          type: boolean
          default: false
        extra_fields:
          type: array
          items:
            type: string
            enum:
            - cross_info
            - milvus
        re:
          type: object
          description: Rule engine config; only one rule allowed per request
          properties:
            LineCrossingDetection:
              type: object
              properties:
                Direction:
                  type: string
                  enum:
                  - In
                  - Out
                  - Any
                Line:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: object
                    properties:
                      x:
                        type: integer
                        minimum: 0
                        maximum: 9999
                      y:
                        type: integer
                        minimum: 0
                        maximum: 9999
            LoiteringDetection:
              type: object
              required:
              - StayTime
              properties:
                StayTime:
                  type: integer
                  minimum: 0
                  description: Triggered after StayTime in seconds
                Field:
                  type: array
                  minItems: 4
                  items:
                    type: object
                    properties:
                      x:
                        type: integer
                        minimum: 0
                        maximum: 9999
                      y:
                        type: integer
                        minimum: 0
                        maximum: 9999
                  description: Polygon points; last point must equal first
            IntrusionDetection:
              type: object
              properties:
                Field:
                  type: array
                  minItems: 4
                  items:
                    type: object
                    properties:
                      x:
                        type: integer
                        minimum: 0
                        maximum: 9999
                      y:
                        type: integer
                        minimum: 0
                        maximum: 9999
                  description: Polygon points; last point must equal first
    DeepsearchV1Response:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              oid:
                type: string
                example: '1777507181551'
              mac:
                type: string
                example: 0002D1A3D613
              obj_type:
                type: string
                example: Human
              first_time:
                type: integer
                description: Unix timestamp in seconds
                example: 1777507181
              extra_info:
                type: object
                nullable: true
                properties:
                  background:
                    type: object
                    properties:
                      time:
                        type: integer
                        description: Unix timestamp in seconds
                        example: 1777507180
              trajectory_points:
                type: array
                nullable: true
                items:
                  type: object
                  properties:
                    time:
                      type: integer
                      description: Unix timestamp in milliseconds
                      example: 1777507181516
                    x:
                      type: integer
                    y:
                      type: integer
              thumbnail_json:
                type: object
                nullable: true
                properties:
                  Thumbnail:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: string
                          example: t_81_2026_4_30
                        s3_bucket:
                          type: string
                        s3_key:
                          type: string
                        start_position:
                          type: integer
                        length:
                          type: integer
        next_token:
          type: object
          nullable: true
          description: Token for fetching next page; null if no more results
          properties:
            partition_start:
              type: string
    DeepsearchV1CountRequest:
      type: object
      description: Same as DeepsearchV1Request but without limit and extra_fields
      required:
      - start
      - end
      - mac_list
      properties:
        start:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
        end:
          type: string
          format: date-time
          example: '2024-01-02T00:00:00Z'
        mac_list:
          type: array
          items:
            type: string
          example:
          - 0002D1A3D613
        obj_type:
          type: string
          enum:
          - Human
          - Vehicle
        is_asc:
          type: boolean
        time_limit:
          type: integer
          default: 50
        time_filter:
          type: object
          properties:
            daily_start:
              type: string
            daily_end:
              type: string
        attributes:
          type: object
          description: Attribute filters
          properties:
            Age:
              type: string
